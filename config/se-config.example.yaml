# SE config — copy this to your workspace root as `.se-config.yaml` and fill in YOUR values.
# Default workspace root is ~/.se-skills (override below or via the $SE_WORKSPACE env var).
# Each team member maintains their own. Do NOT commit your real config to the repo.
#
# Skills use this for:
#  - Where your customer data / transcripts / notes live (workspace_root + layout)
#  - [SE name] placeholder in generated outputs
#  - Call attribution in post-call (matches transcript attendees to determine if you were on the call)
#  - Email signatures in follow-up-email
#  - Salesforce org alias for CRM enrichment
#  - Project memory location

# ── Workspace paths ──────────────────────────────────────────────────────────
# Root for all customer data, transcripts, and notes.
# Resolution order: $SE_WORKSPACE env var  >  this value  >  ~/.se-skills (default)
workspace_root: "~/.se-skills"

# Optional — override individual dirs if your existing tree differs from the default
# (default: {workspace_root}/customers, {customers_dir}/_transcripts, {workspace_root}/notes).
# Example for a legacy numbered layout under ~/airbyte-work:
# layout:
#   customers_dir:   "~/airbyte-work/01-customers"
#   transcripts_dir: "~/airbyte-work/01-customers/_transcripts"
#   notes_dir:       "~/airbyte-work/04-notes"

# Claude Code project-memory directory. Per-user; NO portable default (it embeds your
# OS username + workspace slug). Find yours: `ls ~/.claude/projects/` and pick the one
# matching your workspace. Leave unset to disable memory features (skills skip gracefully).
# memory_dir: "~/.claude/projects/<your-project-slug>/memory"

# Optional — local Airbyte repo checkouts for deeper connector analysis (connector-feasibility).
# Unset → the skill uses MCP/registry data only. See README → "Optional enhancements".
# airbyte_repos_dir: "~/airbyte-work/02-repos"

# Optional — product & connector reference data: grounds connector availability +
# entitlement reasoning in live product truth (connector-feasibility, deployment-model-qual,
# objection-handler, tech-qual, poc-plan). Repo paths are relative to airbyte_repos_dir.
# All sources degrade gracefully; enterprise repo is PRIVATE (omit if no access).
# See README → "Optional enhancements" and _se-playbook.md → "Product & Connector Reference Data".
# reference_data:
#   registry:
#     oss_url:   "https://connectors.airbyte.com/files/registries/v0/oss_registry.json"
#     cloud_url: "https://connectors.airbyte.com/files/registries/v0/cloud_registry.json"
#     cache_dir: "registry"
#     cache_ttl_hours: 24
#   repos:
#     airbyte_platform:   "airbyte-platform"     # public
#     airbyte_enterprise: "airbyte-enterprise"   # PRIVATE — optional
#   connector_models:
#     enabled: false

# ── Model configuration (optional) ─────────────────────────────────────────
# Which Claude model the webapp uses for quick-ask, live-ask, deep skill runs,
# or specific skills. Any key missing falls back to `default`, then to the app
# default (`claude-sonnet-4-6`). Per-skill keys match the skill folder name.
# models:
#   default: "claude-sonnet-4-6"
#   quick-ask: "claude-sonnet-4-6"
#   live-ask: "claude-sonnet-4-6"
#   deal-assessment: "claude-opus-4-6"
#   roi-business-case: "claude-opus-4-6"

# ── SE identity ────────────────────────────────────────────────────────────────
name: "Your Name"
email: "you@airbyte.io"
slack_handle: "@you"
role: "Solutions Engineer"

# Optional aliases (nicknames, alternate spellings) used in transcript matching
aliases:
  - "Nickname"

# AEs you typically pair with (helps post-call attribution)
ae_pairings:
  - name: "AE Name"
    role: "AE"

# Salesforce integration (used by next-move, deal-assessment, biz-qual,
# tech-qual, connector-feasibility, internal-prep)
salesforce:
  # The alias you used in `sf org login web --alias <alias>`. Confirm via `sf org list`.
  org_alias: "airbyte-prod"
  # Directory the MCP runs from — set to your workspace_root
  query_directory: "~/.se-skills"
  # Set false to disable SFDC reads entirely (skills degrade gracefully)
  enabled: true

# ── POV Google Sheets (pov-gsheet) ──────────────────────────────────────────
# The `pov-gsheet` skill builds a structured POV context from the workspace
# (prior skill outputs, transcripts, and optional Salesforce) and then uses
# Chrome/computer-use to copy a Google Sheets template, fill the seven tabs,
# and move the new sheet into the correct Drive prospect subfolder.
#
# Required setup:
# 1. Copy the shared POV template into your own Google Drive (or keep the team one).
# 2. Chrome must be signed into the Google account that owns the template/Drive.
# 3. Chrome must be launched with --remote-debugging-port=29229 OR the
#    computer-use MCP with clipboardWrite must be available.
# 4. Uncomment the block below and fill in the template/folder URLs.
#
# Optional Node/Playwright runner: `cd webapp/scripts && npm install` installs
# Playwright for `pov-gsheet-runner.mjs`. Without it, the skill falls back to
# manual clipboard/Name Box instructions.
# pov_gsheet:
#   # Google Sheets URL to copy (must be a Sheets URL, not an .xlsx)
#   template_url: "https://docs.google.com/spreadsheets/d/.../edit"
#   # Destination Drive "Customer" folder where prospect subfolders are created
#   drive_target_folder_url: "https://drive.google.com/drive/u/0/folders/..."
#   # SE contact shown on the Contacts sheet
#   se_name: "Your Name"
#   se_title: "Solutions Engineer"
