<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Solutions Team Hub</title>
  <!-- Inline SVG favicon (no external file → no /favicon.ico 404) -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2032%2032'%3E%3Crect%20width='32'%20height='32'%20rx='7'%20fill='%23151a24'/%3E%3Ctext%20x='16'%20y='22'%20font-family='Inter,system-ui,sans-serif'%20font-size='19'%20font-weight='700'%20fill='%234263eb'%20text-anchor='middle'%3ES%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="/style.css" id="css-link" />
</head>
<body>
  <header>
    <div class="bar">
      <a href="#/" class="brand">Solutions Team Hub</a>
      <nav id="crumbs" class="crumbs"></nav>
      <div class="bar-right">
        <a href="#/help" class="help-link">Skills Help</a>
        <button id="theme-toggle" class="theme-toggle" title="Toggle light/dark" aria-label="Toggle theme">🌙</button>
      </div>
    </div>
  </header>

  <main id="view"><!-- rendered by app.js --></main>

  <!-- Global skill-completion toasts (top-right, persistent across routes) -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Invoke-skill modal -->
  <div id="modal" class="modal hidden">
    <div class="modal-card">
      <h3 id="modal-title">Invoke skill</h3>
      <div class="modal-body">
        <div id="skill-mode">
          <div class="skill-picker">
            <label class="skill-picker-label" for="skill-select">Skill</label>
            <div class="skill-picker-row">
              <select id="skill-select"></select>
              <button id="skill-refresh" class="ghost small" title="Reload skills from disk" type="button">↻</button>
              <span id="skill-tier" class="skill-tier hidden"></span>
            </div>
          </div>
          <div id="skill-summary" class="skill-summary"></div>
          <button id="skill-more" class="linklike skill-more hidden" type="button">Show details</button>
          <div id="skill-details" class="skill-details hidden"></div>
          <div id="skill-prereq" class="skill-prereq hidden"></div>
          <div id="skill-perm" class="skill-perm hidden"></div>
          <label class="skill-extra-label" for="skill-extra">Optional context <span class="muted">(e.g. an objection, a specific question)</span>
            <textarea id="skill-extra" rows="2" placeholder="Leave blank for default behavior"></textarea>
          </label>
        </div>
        <div id="invoke-status" class="status hidden"></div>
        <pre id="invoke-output" class="output hidden"></pre>
      </div>
      <div class="modal-actions">
        <button id="invoke-cancel" class="ghost">Cancel</button>
        <button id="invoke-run" class="primary">Run skill</button>
      </div>
    </div>
  </div>

  <script>
    // Cache-bust CSS so style changes always take effect on reload (StaticFiles
    // sends etag/last-modified; a version query forces a fresh fetch each session).
    (function () {
      var l = document.getElementById("css-link");
      l.href = "/style.css?v=" + Date.now();
    })();
  </script>
  <script src="/app.js?v=2026071602"></script>
</body>
</html>
