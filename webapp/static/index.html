<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Solutions Team Hub</title>
  <link rel="stylesheet" href="/style.css" id="css-link" />
</head>
<body>
  <header>
    <div class="bar">
      <a href="#/" class="brand">Solutions Team Hub</a>
      <nav id="crumbs" class="crumbs"></nav>
      <div class="bar-right">
        <a href="#/help" class="help-link">Skills Help</a>
        <button id="theme-toggle" class="theme-toggle" title="Toggle light/dark" aria-label="Toggle theme">🌙</button>
      </div>
    </div>
  </header>

  <main id="view"><!-- rendered by app.js --></main>

  <!-- Invoke-skill modal -->
  <div id="modal" class="modal hidden">
    <div class="modal-card">
      <h3 id="modal-title">Invoke skill</h3>
      <div id="skill-mode">
        <label>Skill
          <select id="skill-select"></select>
        </label>
        <div id="skill-blurb" class="muted"></div>
        <label>Optional context (e.g. an objection, a specific question)
          <textarea id="skill-extra" rows="3" placeholder="Leave blank for default behavior"></textarea>
        </label>
      </div>
      <div class="modal-actions">
        <button id="invoke-cancel" class="ghost">Cancel</button>
        <button id="invoke-run" class="primary">Run skill</button>
      </div>
      <div id="invoke-status" class="status hidden"></div>
      <pre id="invoke-output" class="output hidden"></pre>
    </div>
  </div>

  <script>
    // Cache-bust CSS so style changes always take effect on reload (StaticFiles
    // sends etag/last-modified; a version query forces a fresh fetch each session).
    (function () {
      var l = document.getElementById("css-link");
      l.href = "/style.css?v=" + Date.now();
    })();
  </script>
  <script src="/app.js?v=20260616k"></script>
</body>
</html>
