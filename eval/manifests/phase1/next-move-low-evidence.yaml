manifest_version: "1.0"
id: phase1-next-move-low-evidence
title: next-move stays low-confidence when evidence is thin
skills_under_test:
  - next-move
tags:
  - next-move
  - low-confidence
  - workflow-routing
fixtures:
  transcripts:
    - source: fixtures/transcripts/acme-2026-06-15-intro.txt
      target: _transcripts/Acme-06.15.26.txt
  config: fixtures/config/synthetic-se-config.yaml
environment:
  salesforce: false
customer_constraints:
  - Interested in Airbyte.
  - Early in evaluation.
  - Has some pipeline pain but no detailed discovery.
available_evidence:
  - One old intro transcript from June 15.
  - No qualification documents.
required_behavior:
  - Express low confidence.
  - Recommend discovery or account-refresher, not a POC plan.
forbidden_behavior:
  - Recommending poc-plan or mutual-close-plan without a qualification doc.
expected_sections:
  - At a Glance
  - Source Coverage
per_skill_expected_sections:
  next-move:
    - Current read
    - Ranked Next Moves
deterministic_assertions:
  - name: confidence is low
    target: markdown
    skills:
      - next-move
    check: "section_contains(output, 'At a Glance', 'confidence:** low') or section_contains(output, 'At a Glance', 'low confidence') or section_contains(output, 'At a Glance', 'low-confidence')"
    severity: major
  - name: ranked moves include an early-stage action
    target: markdown
    skills:
      - next-move
    check: "section_contains_any_case_insensitive(output, 'Ranked Next Moves', ['follow-up-email', 'prep-call', 'account-refresher', 'biz-qual', 'deal-assessment'])"
    severity: major
  - name: does not recommend poc-plan as a ranked move
    target: markdown
    skills:
      - next-move
    check: "not section_contains(output, 'Ranked Next Moves', 'poc-plan')"
    severity: blocker
  - name: does not recommend mutual-close-plan as a ranked move
    target: markdown
    skills:
      - next-move
    check: "not section_contains(output, 'Ranked Next Moves', 'mutual-close-plan')"
    severity: blocker
  - name: source coverage is present
    target: markdown
    check: "has_section(output, 'Source Coverage')"
    severity: blocker
failure_severity: major
